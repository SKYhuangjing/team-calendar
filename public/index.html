<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>项目人力排期日历</title>
<link rel="stylesheet" href="css/main.css" />
</head>
<body>
<div class="app">
  <div class="toolbar-row">
    <span class="brand-sm" data-i18n="app.title">排期日历</span>
    <div class="tabs tabs-sm">
      <div class="tab active" id="tabProjects" data-i18n="tab.projects">项目</div>
      <div class="tab" id="tabPeople" data-i18n="tab.people">人员</div>
      <div class="tab" id="tabSettings" data-i18n="tab.settings">设置</div>
    </div>
    <div id="stats" class="stats-inline"></div>
    <div style="flex:1"></div>
    <div class="view-switch" role="group" aria-label="视图切换">
      <button class="seg" data-view-mode="30d" id="vm30d" data-i18n="view.30d">30 天</button>
      <button class="seg" data-view-mode="45d" id="vm45d" data-i18n="view.45d">45 天</button>
      <button class="seg" data-view-mode="60d" id="vm60d" data-i18n="view.60d">60 天</button>
      <button class="seg" data-view-mode="custom" id="vmCustom" data-i18n="view.custom">自定义</button>
    </div>
    <div class="custom-days" id="customDaysBox" style="display:none">
      <input id="customDaysInput" type="number" min="1" max="180" value="30" aria-label="自定义天数" />
      <span data-i18n="view.customDayUnit">天</span>
    </div>
    <div class="pager" role="group" aria-label="日期翻页">
      <button id="pageToday" class="pager-btn" data-i18n="btn.today">今天</button>
    </div>
    <button id="filterToggle" class="tool-btn" aria-label="筛选与搜索" title="筛选与搜索" data-i18n="btn.filter">筛选</button>
    <button id="undoBtn" class="tool-btn disabled" aria-label="撤销" title="撤销最近操作" data-i18n="btn.undo">撤销</button>
    <button id="themeBtn" class="tool-btn" aria-label="切换主题" title="切换亮 / 暗 / 跟随系统" data-i18n="btn.theme">主题</button>
    <button id="printBtn" class="tool-btn" aria-label="打印" title="打印或导出 PDF" data-i18n="btn.print">打印</button>
    <select id="langSelect" class="lang-select" aria-label="语言 / Language">
      <option value="zh">中文</option>
      <option value="en">English</option>
    </select>
    <button data-pool="1" data-i18n="btn.resourcePool">资源池</button>
  </div>
  <div id="filterBar" class="filter-bar" style="display:none">
    <input id="searchInput" type="search" placeholder="搜索人员 / 项目名称…" aria-label="搜索" data-i18n-placeholder="filter.searchPlaceholder" />
    <div id="filterDept" class="ms" aria-label="按部门筛选（多选）"></div>
    <div id="filterRole" class="ms" aria-label="按角色筛选（多选）"></div>
    <select id="filterProject" aria-label="按项目筛选"></select>
    <select id="filterOwner" aria-label="按负责人筛选"></select>
    <button id="filterClear" class="tool-btn" data-i18n="filter.clear">清除筛选</button>
    <span id="filterHint" class="hint"></span>
  </div>
  <div class="workspace">
    <div id="calendarCard" class="calendar-card">
      <div id="calendarLoading" class="calendar-loading-overlay"><div class="spinner-sm"></div></div>
      <div class="calendar-head-slim"><span id="rangeTitle" class="range-title"></span><span id="calendarHint" class="hint" style="margin-left:10px"></span></div>
      <div class="calendar-wrap"><div id="scheduler" class="grid"></div></div>
    </div>
    <div id="settingsCard" class="settings-card" style="display:none"></div>
  </div>
</div>
<div id="drawerMask" class="drawer-mask">
  <aside class="drawer">
    <div class="drawer-head"><div class="drawer-title" data-i18n="drawer.title">资源池</div><div style="flex:1"></div><span id="drawerAdd" style="margin-right:8px"></span><button data-i18n="drawer.close">关闭</button></div>
    <div class="resource-tabs">
      <button id="rPeople" data-resource-tab="people" data-i18n="resource.people">人员</button>
      <button id="rProjects" data-resource-tab="projects" data-i18n="resource.projects">项目</button>
      <button id="rMilestones" data-resource-tab="milestones" data-i18n="resource.milestones">里程碑</button>
    </div>
    <div id="resourceBody" class="resource-body"></div>
  </aside>
</div>
<div id="modalMask" class="modal-mask"><div class="modal"><div class="modal-head"><h2 id="modalTitle"></h2><button onclick="document.getElementById('modalMask').classList.remove('show')">×</button></div><div id="modalBody" class="modal-body"></div><div class="modal-foot"><button id="modalDelete" class="danger" data-i18n="btn.delete">删除</button><div style="flex:1"></div><button id="modalCancel" data-i18n="btn.cancel">取消</button><button id="modalSave" class="active" data-i18n="btn.save">保存</button></div></div></div>
<div id="breakdownMask" class="breakdown-mask" style="display:none"><div class="breakdown-panel"><div class="breakdown-head"><h3 id="breakdownTitle"></h3><div style="flex:1"></div><button id="breakdownClose">×</button></div><div id="breakdownBody" class="breakdown-body"></div></div></div>
<div id="toast" class="toast"></div>
<div id="ctxMenu" class="ctx-menu" style="display:none"></div>
<div id="dragTip" class="drag-tip"></div>
<div id="rcTooltip" class="rc-tooltip" role="tooltip" aria-hidden="true"></div>
<input id="csvFile" type="file" accept=".csv,text/csv" style="display:none" />
<div id="printList" class="print-list" style="display:none"></div>
<script type="module" src="js/app.js"></script>
</body>
</html>
