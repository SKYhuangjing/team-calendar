<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>项目人力排期日历 0.0.1</title>
<style>
:root{--bg:#f6efe3;--card:#fff8ec;--ink:#1d1b16;--muted:#746a5b;--line:#1d1b16;--accent:#ffb84d;--soft:#fff2d8;--shadow:4px 4px 0 #1d1b16;--red:#ff6b6b;--green:#92d987;--blue:#7db7ff;--purple:#b69cff}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font-family:Inter,system-ui,-apple-system,"Segoe UI",sans-serif}.app{height:100vh;display:flex;flex-direction:column;padding:18px;gap:12px}.top{display:flex;align-items:flex-start;justify-content:space-between;gap:16px}.brand h1{font-family:Georgia,"Times New Roman",serif;margin:0 0 6px;font-size:30px}.desc{color:var(--muted);font-weight:800;font-size:13px}.toolbar{display:none}button{border:2px solid var(--line);background:#fff;border-radius:12px;padding:9px 12px;font-weight:950;box-shadow:3px 3px 0 var(--line);cursor:pointer;color:var(--ink)}button:hover{transform:translate(1px,1px);box-shadow:2px 2px 0 var(--line)}button.active,.tab.active{background:var(--accent)}button.danger{background:#ffe0e0}.tabs{display:flex;gap:10px;align-items:center}.tab{border:2px solid var(--line);border-radius:999px;background:#fff;padding:10px 18px;font-weight:950;box-shadow:3px 3px 0 var(--line);cursor:pointer}.stats{display:grid;grid-template-columns:repeat(6,1fr);gap:10px}.stat{background:#fff;border:2px solid var(--line);border-radius:14px;box-shadow:3px 3px 0 var(--line);padding:10px 14px;min-height:62px}.stat b{font-family:Georgia,"Times New Roman",serif;font-size:25px;display:block;line-height:1}.stat small{font-weight:900;color:var(--muted)}.workspace{flex:1;min-height:0;display:flex;flex-direction:column;gap:10px}.calendar-card,.settings-card{background:var(--card);border:3px solid var(--line);border-radius:20px;box-shadow:var(--shadow);overflow:hidden;min-height:0;flex:1}.calendar-head{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;border-bottom:2px solid var(--line);background:#fff4dd}.range-title{font-family:Georgia,"Times New Roman",serif;font-size:22px;font-weight:950}.hint{color:var(--muted);font-weight:800;font-size:13px}.calendar-wrap{height:100%;overflow:auto}.grid{min-width:2980px}.row{display:grid;min-height:96px}.row.header{position:sticky;top:0;z-index:8;min-height:62px}.head-cell,.name-cell,.cell{border-right:2px solid var(--line);border-bottom:2px solid var(--line)}.head-cell{background:#fff1d4;padding:8px;text-align:center;font-weight:950}.head-cell.today{background:var(--accent)}.head-cell.past{background:#eee6da;color:#8a8174}.name-cell{position:sticky;left:0;z-index:5;background:#fffaf0;padding:12px;font-weight:950}.name-cell small{display:block;margin-top:5px;color:var(--muted);font-weight:800}.cell{background:#fffaf0;min-height:96px;padding:5px;position:relative}.cell.weekend{background:#eadccb}.cell.drop{outline:4px dashed var(--accent);outline-offset:-6px}.assign{border:2px solid var(--line);border-radius:11px;padding:7px;margin-bottom:5px;font-size:12px;font-weight:950;box-shadow:2px 2px 0 var(--line);cursor:grab;line-height:1.15;word-break:break-all}.assign small{display:block;margin-top:4px;font-size:10px}.assign.over{background:#ff7c7c!important}.assign.range{min-height:54px;border-style:solid}.milestone{border:2px solid var(--line);background:#1d1b16;color:#fff;border-radius:999px;padding:4px 7px;margin-bottom:5px;font-size:11px;font-weight:950;cursor:grab;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.milestone.risk{background:#ff6b6b;color:#1d1b16}.fab{position:fixed;right:22px;bottom:22px;z-index:30;background:var(--accent);padding:13px 16px}.drawer-mask{position:fixed;inset:0;background:transparent;display:none;z-index:40;pointer-events:none}.drawer-mask.show{display:block}.drawer{position:absolute;right:0;top:0;height:100%;width:390px;pointer-events:auto;background:var(--card);border-left:3px solid var(--line);box-shadow:-6px 0 0 rgba(0,0,0,.18);display:flex;flex-direction:column}.drawer-head{display:flex;justify-content:space-between;align-items:center;padding:16px;border-bottom:2px solid var(--line)}.drawer-title{font-family:Georgia,"Times New Roman",serif;font-size:24px;font-weight:950}.resource-tabs{display:flex;gap:8px;padding:12px 16px;border-bottom:2px solid var(--line)}.resource-tabs button{flex:1;padding:8px}.resource-body{padding:14px 16px;overflow:auto}.item{display:flex;align-items:center;justify-content:space-between;gap:10px;background:#fff;border:2px solid var(--line);border-radius:14px;padding:10px;margin-bottom:10px;box-shadow:2px 2px 0 var(--line);font-weight:950;cursor:grab}.item small{color:var(--muted);font-weight:850}.item .actions{display:flex;gap:5px;flex-shrink:0}.mini{font-size:11px;padding:5px 7px;border-radius:8px;box-shadow:1px 1px 0 var(--line)}.dot{display:inline-block;width:12px;height:12px;border:2px solid var(--line);border-radius:50%;margin-right:6px;vertical-align:-1px}.settings-card{padding:16px;overflow:auto}.settings-subtabs{display:flex;gap:10px;margin-bottom:14px;position:sticky;top:0;background:var(--card);z-index:5;padding-bottom:10px}.settings-subtabs button.active{background:var(--accent)}.settings-layout{display:grid;grid-template-columns:1fr 1fr;gap:14px}.panel{background:#fffaf0;border:2px solid var(--line);border-radius:18px;padding:14px;box-shadow:3px 3px 0 var(--line)}.panel h3{margin:0 0 10px;font-size:21px}.json-box{grid-column:1/-1}.json-box pre{background:#1f1d19;color:#fff6df;border-radius:14px;padding:14px;max-height:260px;overflow:auto;font-size:12px}.modal-mask{position:fixed;inset:0;background:rgba(0,0,0,.36);display:none;align-items:center;justify-content:center;z-index:60}.modal-mask.show{display:flex}.modal{width:min(680px,calc(100vw - 28px));background:#fff8ec;border:3px solid var(--line);border-radius:24px;box-shadow:8px 8px 0 var(--line);overflow:hidden}.modal-head{background:#fff1d4;border-bottom:2px solid var(--line);padding:16px 18px;display:flex;justify-content:space-between;align-items:center}.modal-head h2{margin:0;font-size:25px}.modal-body{padding:18px}.modal-foot{border-top:2px solid var(--line);padding:14px 18px;display:flex;justify-content:flex-end;gap:10px;background:#fffdf8}.form{display:grid;gap:13px}.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}label{font-size:12px;font-weight:950;color:var(--muted);display:block;margin-bottom:5px}input,select,textarea{width:100%;border:2px solid var(--line);border-radius:12px;background:#fff;padding:10px;font-weight:850}input[type="date"]{cursor:pointer}input[type="date"]::-webkit-calendar-picker-indicator{border-radius:6px;padding:2px;cursor:pointer;opacity:.5}input[type="date"]::-webkit-calendar-picker-indicator:hover{opacity:1;background:#fff2d8}.form-hint{color:var(--muted);font-size:11px;font-weight:900;margin-top:4px}textarea{min-height:88px}.toast{position:fixed;left:50%;bottom:25px;transform:translateX(-50%);background:#1d1b16;color:#fff;padding:12px 16px;border-radius:999px;font-weight:950;opacity:0;pointer-events:none;transition:.2s;z-index:90}.toast.show{opacity:1}.empty{color:var(--muted);font-weight:900;padding:14px;border:2px dashed var(--line);border-radius:14px;background:#fffdf8}@media(max-width:1100px){.stats{grid-template-columns:repeat(3,1fr)}.settings-layout{grid-template-columns:1fr}.drawer{width:min(92vw,390px)}}

/* 0.0.1-range-bars: horizontal assignment bars */
.row{position:relative}
.cell{padding-top:36px}
.head-cell.weekend{font-size:12px;color:#8b7b65;background:#eadccb}
.assign.bar{position:absolute;z-index:6;margin:0;height:30px;display:block;overflow:hidden;white-space:nowrap;word-break:normal;text-overflow:ellipsis;cursor:default;user-select:none}
.assign.bar .bar-main{height:100%;min-width:0;display:flex;flex-direction:row;align-items:center;padding:0 10px;cursor:grab;overflow:hidden;touch-action:none;gap:4px}
.assign.bar .bar-main:active{cursor:grabbing}
.assign.bar .bar-main span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:12px;font-weight:1000;letter-spacing:.2px}
.assign.bar small{margin-top:0;font-size:10px;font-weight:900}
.resize-handle{position:absolute;top:0;bottom:0;width:9px;z-index:2;display:flex;align-items:center;justify-content:center;cursor:ew-resize;background:rgba(255,255,255,.20);font-weight:950;color:rgba(0,0,0,.55)}
.resize-handle:hover{background:rgba(255,255,255,.52)}
.resize-handle.left{left:0;border-right:1px solid rgba(0,0,0,.28)}
.resize-handle.right{right:0;border-left:1px solid rgba(0,0,0,.28)}
.assign.bar.resizing{outline:3px dashed var(--line);outline-offset:2px;z-index:20}
.assign.bar.selected{outline:3px solid var(--red);outline-offset:2px;z-index:21}
.milestone.selected{outline:3px solid var(--red);outline-offset:2px;z-index:21}
.ctx-menu{position:fixed;z-index:100;background:#fff8ec;border:2px solid var(--line);border-radius:12px;box-shadow:4px 4px 0 var(--line);padding:4px;min-width:140px}
.ctx-menu div{padding:8px 12px;font-weight:900;font-size:13px;border-radius:8px;cursor:pointer}
.ctx-menu div:hover{background:var(--accent)}
.drag-handle{cursor:grab;font-size:14px;color:var(--muted);padding:2px 6px;user-select:none;flex-shrink:0;letter-spacing:2px;line-height:1}
.drag-handle:active{cursor:grabbing}
.resource-body .item.dragging{opacity:.4}
.resource-body .drop-line{height:3px;background:var(--accent);border-radius:2px;margin:2px 0}
.cell.drop{background:#fff1c5}
.cell.out-of-range{background:#e8e0d4;opacity:.5}
.name-cell{z-index:10!important}
.item.person-card .dot{border-radius:8px}
.drag-tip{position:fixed;z-index:120;pointer-events:none;background:#1d1b16;color:#fff;padding:8px 10px;border-radius:999px;font-size:12px;font-weight:950;box-shadow:3px 3px 0 rgba(0,0,0,.2);display:none}
/* 节假日 */
.head-cell.holiday{background:#ffe0e0;color:#c44}
.cell.holiday{background:#fff0f0}
/* 调休上班 */
.head-cell.makeup{background:#d4f5d4;color:#080}
.cell.makeup{background:#edf8ed}
/* 紧凑工具栏 */
.toolbar-row{display:flex;align-items:center;gap:10px;padding:6px 0;flex-shrink:0}
.brand-sm{font-family:Georgia,"Times New Roman",serif;font-size:20px;font-weight:950;white-space:nowrap}
.tabs-sm{display:flex;gap:4px}
.tabs-sm .tab{padding:5px 12px;font-size:13px;box-shadow:2px 2px 0 var(--line)}
.stats-inline{display:flex;gap:6px;font-size:12px;font-weight:950}
.stats-inline span{background:#fff;border:2px solid var(--line);border-radius:10px;padding:3px 8px;box-shadow:2px 2px 0 var(--line);white-space:nowrap}
.stats-inline b{color:var(--ink);margin-right:2px}
.stats-inline small{color:var(--muted)}
.calendar-head-slim{display:flex;align-items:center;justify-content:space-between;padding:6px 14px;border-bottom:2px solid var(--line);background:#fff4dd}
.calendar-head-slim .range-title{font-size:15px}

</style>
</head>
<body>
<div class="app">
  <div class="toolbar-row">
    <span class="brand-sm">排期日历</span>
    <div class="tabs tabs-sm">
      <div class="tab active" id="tabProjects" onclick="setTab('projects')">项目</div>
      <div class="tab" id="tabPeople" onclick="setTab('people')">人员</div>
      <div class="tab" id="tabSettings" onclick="setTab('settings')">设置</div>
    </div>
    <div id="stats" class="stats-inline"></div>
    <div style="flex:1"></div>
    <button onclick="openDrawer('people')">资源池</button>
  </div>
  <div class="workspace">
    <div id="calendarCard" class="calendar-card">
      <div class="calendar-head-slim"><span id="rangeTitle" class="range-title"></span><span id="calendarHint" class="hint" style="margin-left:10px"></span></div>
      <div class="calendar-wrap"><div id="scheduler" class="grid"></div></div>
    </div>
    <div id="settingsCard" class="settings-card" style="display:none"></div>
  </div>
</div>
<div id="drawerMask" class="drawer-mask">
  <aside class="drawer">
    <div class="drawer-head"><div class="drawer-title">资源池</div><button onclick="closeDrawer()">关闭</button></div>
    <div class="resource-tabs">
      <button id="rPeople" onclick="setResourceTab('people')">人员</button>
      <button id="rProjects" onclick="setResourceTab('projects')">项目</button>
      <button id="rMilestones" onclick="setResourceTab('milestones')">里程碑</button>
    </div>
    <div id="resourceBody" class="resource-body"></div>
  </aside>
</div>
<div id="modalMask" class="modal-mask"><div class="modal"><div class="modal-head"><h2 id="modalTitle"></h2><button onclick="closeModal()">×</button></div><div id="modalBody" class="modal-body"></div><div class="modal-foot"><button id="modalDelete" class="danger">删除</button><div style="flex:1"></div><button onclick="closeModal()">取消</button><button id="modalSave" class="active">保存</button></div></div></div>
<div id="toast" class="toast"></div>
<div id="ctxMenu" class="ctx-menu" style="display:none"></div>
<div id="dragTip" class="drag-tip"></div>
<script>
const $=id=>document.getElementById(id);let state={people:[],projects:[],assignments:[],milestones:[]};let activeTab='projects';let resourceTab='people';let settingsTab='people';let dates=[];let holidayMap={};let selectedBarId=null;let selectedMilestoneId=null;
async function loadHolidays(){const y=new Date().getFullYear();try{const r=await fetch(`https://fastly.jsdelivr.net/gh/NateScarlet/holiday-cn@master/${y}.json`);const d=await r.json();holidayMap={};(d.days||[]).forEach(x=>{holidayMap[x.date]=x})}catch(_){holidayMap={}}}
function iso(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}function addDays(d,n){let x=new Date(d);x.setDate(x.getDate()+n);return x}function buildDates(){let today=new Date();today.setHours(0,0,0,0);dates=[];for(let i=-1;i<=30;i++)dates.push(iso(addDays(today,i)));$('rangeTitle').textContent=`${dates[0]} ~ ${dates[dates.length-1]}`}function weekday(d){return '日一二三四五六'[new Date(d+'T00:00:00').getDay()]}function isWeekend(d){let x=new Date(d+'T00:00:00').getDay();return x===0||x===6}function isDayOff(d){const h=holidayMap[d];if(h)return h.isOffDay;return isWeekend(d)}function dayClass(d){const h=holidayMap[d];if(h)return h.isOffDay?'holiday':'makeup';return isWeekend(d)?'weekend':''}function dayLabel(d){const h=holidayMap[d];if(h)return h.isOffDay?h.name:'班';return ''}function isPast(d){return d<iso(new Date())}function person(id){return state.people.find(x=>x.id===id)}function project(id){return state.projects.find(x=>x.id===id)}function endOf(a){return a.endDate||a.date}function inRange(a,d){return a.date<=d&&endOf(a)>=d}function rangeDays(start,end){let s=new Date(start+'T00:00:00'),e=new Date((end||start)+'T00:00:00');return Math.max(1,Math.round((e-s)/86400000)+1)}function shiftRange(a,newStart){let days=rangeDays(a.date,endOf(a));let end=iso(addDays(new Date(newStart+'T00:00:00'),days-1));return {date:newStart,endDate:end}}function overlapDays(a,ds){return ds.filter(d=>inRange(a,d)).length}function totalHours(pid,date){return state.assignments.filter(a=>a.personId===pid&&inRange(a,date)).reduce((s,a)=>s+Number(a.hours||0),0)}
async function api(url,opt){let r=await fetch(url,opt);if(!r.ok)throw new Error((await r.json()).error||r.statusText);return r.json()}const post=(u,d)=>api(u,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(d)});const put=(u,d)=>api(u,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(d)});const del=u=>api(u,{method:'DELETE'});
async function load(){buildDates();await loadHolidays();state=await api('/api/bootstrap');renderAll()}function renderAll(){renderStats();renderMain();renderResourceBody();renderSettings()}function renderStats(){let capacity=state.people.reduce((s,p)=>s+Number(p.dailyCapacity||0)*dates.length,0);let used=state.assignments.reduce((s,a)=>s+Number(a.hours||0)*overlapDays(a,dates),0);let conflicts=0;state.people.forEach(p=>dates.forEach(d=>{if(totalHours(p.id,d)>Number(p.dailyCapacity||8))conflicts++}));let ms=state.milestones.filter(m=>dates.includes(m.date)).length;$('stats').innerHTML=[['产能',capacity+'h'],['已分配',used+'h'],['空闲',Math.max(0,capacity-used)+'h'],['负载',capacity?Math.round(used/capacity*100)+'%':'0%'],['冲突',conflicts],['里程碑',ms]].map(x=>`<span><b>${x[1]}</b><small>${x[0]}</small></span>`).join('')}
function setTab(tab){activeTab=tab;['Projects','People','Settings'].forEach(n=>$('tab'+n).classList.remove('active'));$('tab'+(tab==='projects'?'Projects':tab==='people'?'People':'Settings')).classList.add('active');$('calendarCard').style.display=tab==='settings'?'none':'block';$('settingsCard').style.display=tab==='settings'?'block':'none';renderMain()}function renderMain(){if(activeTab==='settings'){renderSettings();return}renderScheduler(activeTab==='people'?'person':'project')}
function stableColor(seed){
  const palette=['#7db7ff','#92d987','#ffb84d','#b69cff','#ff9f9f','#7ee0d6','#ffd86b','#c4a484','#b8e986','#f7a8d8','#9ad1ff','#d4b5ff'];
  let h=0;String(seed||'').split('').forEach(ch=>h=(h*31+ch.charCodeAt(0))>>>0);
  return palette[h%palette.length];
}
function personColor(p){return p.color||stableColor('person-'+(p.id||p.name))}
function projectColor(pr){return pr.color||stableColor('project-'+(pr.id||pr.name))}
function dateIndex(d){return dates.indexOf(d)}
function addDaysIso(dateStr,n){return iso(addDays(new Date(dateStr+'T00:00:00'),n))}
function dateWidth(d){return isDayOff(d)?44:88}
function dateColumns(){return '180px '+dates.map(d=>dateWidth(d)+'px').join(' ')}
function calendarWidth(){return 180+dates.reduce((s,d)=>s+dateWidth(d),0)}
function offsetBeforeDate(d){let idx=clampedDateIndex(d);let sum=0;for(let i=0;i<idx;i++)sum+=dateWidth(dates[i]);return sum}
function widthBetweenDates(start,end){let s=clampedDateIndex(start),e=clampedDateIndex(end);if(e<s){let t=s;s=e;e=t}let sum=0;for(let i=s;i<=e;i++)sum+=dateWidth(dates[i]);return sum}
function visibleStartOf(a){return a.date<dates[0]?dates[0]:a.date}
function visibleEndOf(a){return endOf(a)>dates[dates.length-1]?dates[dates.length-1]:endOf(a)}
function dateFromContentX(x){
  let pos=Math.max(0,x-180),acc=0;
  for(let i=0;i<dates.length;i++){let w=dateWidth(dates[i]);if(pos<acc+w)return dates[i];acc+=w}
  return dates[dates.length-1];
}
function rangeVisible(a){return a.date<=dates[dates.length-1]&&endOf(a)>=dates[0]}
function clampedDateIndex(d){if(d<=dates[0])return 0;if(d>=dates[dates.length-1])return dates.length-1;return Math.max(0,dates.indexOf(d))}
function computeAssignmentLanes(assignments){
  const laneEnds=[];
  const laneById={};
  assignments.forEach(a=>{
    const start=visibleStartOf(a),end=visibleEndOf(a);
    let lane=laneEnds.findIndex(lastEnd=>lastEnd<start);
    if(lane===-1){lane=laneEnds.length;laneEnds.push(end)}
    else laneEnds[lane]=end;
    laneById[a.id]=lane;
  });
  return {laneById,laneCount:Math.max(1,laneEnds.length)};
}
function barStyle(a,stackIndex){
  const visibleStart=visibleStartOf(a);
  const visibleEnd=visibleEndOf(a);
  const left=180 + offsetBeforeDate(visibleStart) + 5;
  const width=Math.max(26,widthBetweenDates(visibleStart,visibleEnd)-10);
  const top=4 + stackIndex*36;
  return `left:${left}px;width:${width}px;top:${top}px`;
}
function renderScheduler(view){
  let rows=(view==='person'?state.people:state.projects).filter(r=>!r.archived);
  $('calendarHint').textContent=view==='person'
    ?'人员视图：拖任务条可移动；拖边缘可缩放；选中后按 Delete 删除；右键格子可新增。'
    :'项目视图：拖任务条可移动；拖边缘可缩放；选中后按 Delete 删除；右键格子可新增。';
  $('scheduler').style.minWidth=calendarWidth()+'px';
  const cols=dateColumns();
  let html=`<div class="row header" style="grid-template-columns:${cols}"><div class="head-cell">${view==='person'?'人员 / 日期':'项目 / 日期'}</div>`+dates.map(d=>{const lbl=dayLabel(d);return `<div class="head-cell ${d===iso(new Date())?'today':''} ${isPast(d)?'past':''} ${dayClass(d)}">${d.slice(5)}<br>${weekday(d)}${lbl?'<br><small>'+esc(lbl)+'</small>':''}</div>`}).join('')+'</div>';
  rows.forEach(r=>{
    const rowAssigns=state.assignments.filter(a=>view==='person'?a.personId===r.id:a.projectId===r.id)
      .filter(a=>rangeVisible(a))
      .sort((a,b)=>a.date.localeCompare(b.date)||endOf(a).localeCompare(endOf(b)));
    const laneLayout=computeAssignmentLanes(rowAssigns);
    const maxStack=laneLayout.laneCount;
    const barZone=4+maxStack*36+4;
    const minHeight=Math.max(64,barZone+28);
    html+=`<div class="row" data-view="${view}" data-row-id="${r.id}" style="min-height:${minHeight}px;grid-template-columns:${cols}"><div class="name-cell">${r.name}<br><small>${view==='person'?(r.department+' · '+r.role+' · '+r.dailyCapacity+'h/天'):('负责人：'+(r.owner||'未设置')+' · '+r.priority)}</small></div>`;
    dates.forEach(d=>{
      let ms=view==='project'?state.milestones.filter(m=>m.projectId===r.id&&m.date===d):state.milestones.filter(m=>m.date===d&&(m.owner===r.name||(!m.owner&&state.assignments.some(a=>a.personId===r.id&&a.projectId===m.projectId&&inRange(a,d)))));
      let outOfRange=view==='project'&&((r.startDate&&d<r.startDate)||(r.endDate&&d>r.endDate));

function setDrag(e,data){e.dataTransfer.effectAllowed='move';e.dataTransfer.setData('application/json',JSON.stringify(data));e.dataTransfer.setData('text/plain',JSON.stringify(data))}function dragPerson(e,id){setDrag(e,{type:'person',id})}function dragProject(e,id){setDrag(e,{type:'project',id})}function dragAssign(e,id){
  e.stopPropagation();
  const a=state.assignments.find(x=>x.id===id);
  const bar=$('bar_'+id);
  const scheduler=$('scheduler');
  let meta={type:'assignment',id};
  if(a&&bar&&scheduler){
    const barRect=bar.getBoundingClientRect();
    const schedulerRect=scheduler.getBoundingClientRect();
    // 记录任务条“起始边界”与拖拽起点。落点时用起始边界 + 鼠标位移计算目标开始日期。
    // 这样只做上下移动时，横向位移约为 0，任务会保持原开始日期，不会被鼠标抓取位置带偏。
    meta.startClientX=e.clientX;
    meta.barLeftInScheduler=barRect.left-schedulerRect.left;
    meta.originalDate=a.date;
    meta.originalEndDate=endOf(a);
  }
  setDrag(e,meta);
}function dragMilestone(e,id){e.stopPropagation();setDrag(e,{type:'milestone',id})}function allowDrop(e){e.preventDefault();e.dataTransfer.dropEffect='move';e.currentTarget.classList.add('drop')}function readDrop(e){try{return JSON.parse(e.dataTransfer.getData('application/json')||e.dataTransfer.getData('text/plain')||'{}')}catch(_){return {}}}
function checkProjectRange(projectId,sd,ed){
  const proj=state.projects.find(x=>x.id===projectId);
  if(proj&&proj.startDate&&sd<proj.startDate)return '排期开始日期不能早于 '+proj.startDate;
  if(proj&&proj.endDate&&ed>proj.endDate)return '排期结束日期不能晚于 '+proj.endDate;
  return null;
}
async function dropOnCell(e,view,rowId,date){
  e.preventDefault();
  e.currentTarget.classList.remove('drop');
  let data=readDrop(e);
  if(data.type==='person'){
    let projectId=view==='project'?rowId:state.projects[0]?.id;
    if(!projectId)return toast('请先创建项目');
    const err=checkProjectRange(projectId,date,date);if(err)return toast(err);
    await post('/api/assignments',{personId:data.id,projectId,date,endDate:date,hours:8,note:''});
  }else if(data.type==='project'){
    let personId=view==='person'?rowId:state.people[0]?.id;
    if(!personId)return toast('请先创建人员');
    const err=checkProjectRange(data.id,date,date);if(err)return toast(err);
    await post('/api/assignments',{personId,projectId:data.id,date,endDate:date,hours:8,note:''});
  }else if(data.type==='assignment'){
    let a={...state.assignments.find(x=>x.id===data.id)};
    if(!a.id)return;
    if(view==='person')a.personId=rowId;else a.projectId=rowId;
    // 拖任务条主体表示“移动整个任务”。目标开始日期不再按鼠标落入的单元格直接计算，
    // 而是按“任务条起始边界 + 鼠标横向位移”计算。这样上下移动任务时能稳定保持对等日期。
    let targetStart=date;
    if(Number.isFinite(Number(data.barLeftInScheduler))&&Number.isFinite(Number(data.startClientX))){
      const movedLeft=Number(data.barLeftInScheduler)+(e.clientX-Number(data.startClientX));
      targetStart=dateFromContentX(movedLeft);
    }
    let shifted=shiftRange(a,targetStart);a.date=shifted.date;a.endDate=shifted.endDate;
    const err=checkProjectRange(a.projectId,a.date,endOf(a));if(err)return toast(err);
    await put('/api/assignments/'+a.id,a);
  }else if(data.type==='milestone'){
    let m={...state.milestones.find(x=>x.id===data.id)};
    if(view==='project')m.projectId=rowId;
    m.date=date;
    await put('/api/milestones/'+m.id,m);
  }
  await load();
}

/* ---- pointer-based move: drag bar body to reposition (duration preserved) ---- */
let movingAssignment=null;
/* 辅助：两个日期字符串之间的天数差 */
function dayDiff(d1,d2){return Math.round((new Date(d2+'T00:00:00')-new Date(d1+'T00:00:00'))/86400000)}
/* 辅助：根据鼠标 clientX 获取鼠标所在格子的日期 */
function cellDateAtX(clientX){const r=$('scheduler').getBoundingClientRect();return dateFromContentX(clientX-r.left)}

function startMoveAssignment(e,id){
  if(e.button!==0)return;
  e.preventDefault();e.stopPropagation();
  const a=state.assignments.find(x=>x.id===id);if(!a)return;
  const bar=$('bar_'+id);if(!bar)return;
  movingAssignment={id,original:{...a},startClientX:e.clientX,startClientY:e.clientY,
    startBarLeft:parseFloat(bar.style.left)||bar.offsetLeft,
    startBarTop:parseFloat(bar.style.top)||bar.offsetTop,
    startCellDate:cellDateAtX(e.clientX),active:false};
  window.addEventListener('pointermove',onMoveAssignmentMove);
  window.addEventListener('pointerup',finishMoveAssignment,{once:true});
}
function onMoveAssignmentMove(e){
  if(!movingAssignment)return;
  const m=movingAssignment,dx=e.clientX-m.startClientX,dy=e.clientY-m.startClientY;
  if(!m.active){if(Math.abs(dx)<5&&Math.abs(dy)<5)return;m.active=true;
    const bar=$('bar_'+m.id);if(bar){bar.classList.add('resizing');bar.style.zIndex=100;bar.style.pointerEvents='none'}
    document.body.style.cursor='grabbing';
  }
  const bar=$('bar_'+m.id);if(!bar)return;
  /* 视觉：像素位移让任务条平滑跟随鼠标 */
  bar.style.left=(m.startBarLeft+dx)+'px';bar.style.top=(m.startBarTop+dy)+'px';
  /* 日期：起始格子 → 当前格子，算天数差，整体平移 */
  const offset=dayDiff(m.startCellDate,cellDateAtX(e.clientX));
  const ns=addDaysIso(m.original.date,offset);
  const ne=addDaysIso(endOf(m.original),offset);
  showDragTip(`${ns.slice(5)} ~ ${ne.slice(5)}（${rangeDays(ns,ne)}天）`,e.clientX,e.clientY);
  document.querySelectorAll('.cell.drop').forEach(c=>c.classList.remove('drop'));
  const hitEl=document.elementFromPoint(e.clientX,e.clientY);
  if(hitEl){const cell=hitEl.closest('.cell');if(cell)cell.classList.add('drop')}
}
async function finishMoveAssignment(e){
  window.removeEventListener('pointermove',onMoveAssignmentMove);
  const m=movingAssignment;movingAssignment=null;hideDragTip();
  document.querySelectorAll('.cell.drop').forEach(c=>c.classList.remove('drop'));
  if(!m)return;
  let targetRow=null;
  if(m.active){
    const el=document.elementFromPoint(e.clientX,e.clientY);
    if(el){const rowEl=el.closest('.row:not(.header)');
      if(rowEl&&rowEl.dataset.view&&rowEl.dataset.rowId)targetRow=rowEl;
    }
  }
  const bar=$('bar_'+m.id);
  if(bar){bar.classList.remove('resizing');bar.style.zIndex='';bar.style.pointerEvents=''}
  document.body.style.cursor='';
  if(!m.active){selectBar(m.id);return}
  /* 日期：起始格子 → 松手格子，天数差平移 */
  const offset=dayDiff(m.startCellDate,cellDateAtX(e.clientX));
  const a={...m.original,date:addDaysIso(m.original.date,offset),endDate:addDaysIso(endOf(m.original),offset)};
  if(targetRow){
    if(targetRow.dataset.view==='person')a.personId=targetRow.dataset.rowId;else a.projectId=targetRow.dataset.rowId;
  }
  const err=checkProjectRange(a.projectId,a.date,endOf(a));
  if(err){await load();return toast(err)}
  await put('/api/assignments/'+a.id,a);await load();toast('已移动任务');
}

let resizingAssignment=null;
function showDragTip(text,x,y){let tip=$('dragTip');tip.textContent=text;tip.style.left=(x+12)+'px';tip.style.top=(y+12)+'px';tip.style.display='block'}
function hideDragTip(){$('dragTip').style.display='none'}
function startResizeAssignment(e,id,side){
  e.preventDefault();e.stopPropagation();
  const a=state.assignments.find(x=>x.id===id);if(!a)return;
  const barEl=$('bar_'+id);
  const stackIndex=barEl?Math.round((parseFloat(barEl.style.top)||0)/36):0;
  resizingAssignment={id,side,original:{...a},next:{...a},stackIndex};
  if(barEl)barEl.classList.add('resizing');
  window.addEventListener('pointermove',onResizeAssignmentMove);
  window.addEventListener('pointerup',finishResizeAssignment,{once:true});
  onResizeAssignmentMove(e);
}
function onResizeAssignmentMove(e){
  if(!resizingAssignment)return;
  const rect=$('scheduler').getBoundingClientRect();
  const d=dateFromContentX(e.clientX-rect.left);
  const a={...resizingAssignment.original};
  if(resizingAssignment.side==='left'){
    a.date=d<=endOf(a)?d:endOf(a);
  }else{
    a.endDate=d>=a.date?d:a.date;
  }
  resizingAssignment.next=a;
  const el=$('bar_'+a.id);
  if(el)el.style.cssText=el.style.cssText.replace(/left:[^;]+;width:[^;]+;/,'')+barStyle(a,resizingAssignment.stackIndex);
  showDragTip(`${a.date} ~ ${endOf(a)}`,e.clientX,e.clientY);
}
async function finishResizeAssignment(e){
  window.removeEventListener('pointermove',onResizeAssignmentMove);
  const r=resizingAssignment;resizingAssignment=null;hideDragTip();
  if(!r)return;
  const el=$('bar_'+r.id);if(el)el.classList.remove('resizing');
  const a=r.next;
  const err=checkProjectRange(a.projectId,a.date,endOf(a));
  if(err){await load();return toast(err)}
  await put('/api/assignments/'+a.id,a);
  await load();toast('已调整任务区间');
}

function openProject(id){let p=id?project(id):{name:'',owner:'',priority:'中',color:'#7db7ff',startDate:'',endDate:'',archived:0};showModal(id?'编辑项目':'新增项目',`<div class="form"><div><label>项目名称</label><input id="f_name" value="${esc(p.name||'')}"></div><div class="form-row"><div><label>负责人</label><input id="f_owner" list="peopleList" value="${esc(p.owner||'')}"><datalist id="peopleList">${state.people.filter(x=>!x.archived).map(x=>`<option value="${esc(x.name)}"></option>`).join('')}</datalist></div><div><label>优先级</label><select id="f_pri"><option ${p.priority==='高'?'selected':''}>高</option><option ${p.priority==='中'?'selected':''}>中</option><option ${p.priority==='低'?'selected':''}>低</option></select></div></div><div class="form-row"><div><label>项目开始日期</label><input id="f_start" type="date" value="${p.startDate||''}"></div><div><label>项目结束日期</label><input id="f_end" type="date" value="${p.endDate||''}"></div></div><span class="form-hint">设置后排期日期不能超出此范围，留空不限制。</span><div><label>项目颜色</label><input id="f_color" type="color" value="${p.color||'#7db7ff'}"></div>${id?`<div><label><input id="f_archived" type="checkbox" ${p.archived?'checked':''}> 归档（不在日历和下拉中显示）</label></div>`:''}</div>`,async()=>{let d={name:val('f_name'),owner:val('f_owner'),priority:val('f_pri'),color:val('f_color'),startDate:val('f_start'),endDate:val('f_end')};if(id)d.archived=$('f_archived').checked?1:0;if(!d.name)return toast('请输入项目名');if(d.startDate&&d.endDate&&d.endDate<d.startDate)return toast('结束日期不能早于开始日期');id?await put('/api/projects/'+id,d):await post('/api/projects',d);closeModal();await load();toast('已保存项目')},id?async()=>{await deleteProject(id,true);closeModal()}:null)}
function updatePerDayHint(){const d=rangeDays(val('f_date'),val('f_end'));const t=Number(val('f_total')||0);const el=$('f_perday');if(el)el.textContent=d+'天 · 每日'+(d>0?(t/d).toFixed(1):'0.0')+'h'}
function openAssignment(id){let a=state.assignments.find(x=>x.id===id);const days=rangeDays(a.date,endOf(a));const totalH=Math.round(Number(a.hours||0)*days*10)/10;const peopleList=state.people.filter(p=>!p.archived||p.id===a.personId);const projectList=state.projects.filter(p=>!p.archived||p.id===a.projectId);showModal('编辑排期',`<div class="form"><div class="form-row"><div><label>人员</label><select id="f_person">${peopleList.map(p=>`<option value="${p.id}" ${a.personId===p.id?'selected':''}>${p.name}${p.archived?' (归档)':''}</option>`).join('')}</select></div><div><label>项目</label><select id="f_project">${projectList.map(p=>`<option value="${p.id}" ${a.projectId===p.id?'selected':''}>${p.name}${p.archived?' (归档)':''}</option>`).join('')}</select></div></div><div class="form-row"><div><label>开始日期</label><input id="f_date" type="date" value="${a.date}" onchange="updatePerDayHint()"></div><div><label>结束日期</label><input id="f_end" type="date" value="${endOf(a)}" onchange="updatePerDayHint()"></div></div><div class="form-row"><div><label>总工时</label><input id="f_total" type="number" value="${totalH}" min="0" oninput="updatePerDayHint()"><span id="f_perday" class="form-hint">${days}天 · 每日${(days>0?(totalH/days):0).toFixed(1)}h</span></div><div><label>备注</label><input id="f_note" value="${esc(a.note||'')}"></div></div></div>`,async()=>{const sd=val('f_date'),ed=val('f_end'),d=rangeDays(sd,ed),t=Number(val('f_total')||0);const proj=state.projects.find(x=>x.id===val('f_project'));if(proj&&proj.startDate&&sd<proj.startDate)return toast('排期开始日期不能早于 '+proj.startDate);if(proj&&proj.endDate&&ed>proj.endDate)return toast('排期结束日期不能晚于 '+proj.endDate);await put('/api/assignments/'+id,{personId:val('f_person'),projectId:val('f_project'),date:sd,endDate:ed,hours:d>0?Math.round(t/d*10)/10:8,note:val('f_note')});closeModal();await load();toast('已保存排期')},async()=>{await deleteAssignment(id,true);closeModal()})}
function openMilestone(id){let m=id?state.milestones.find(x=>x.id===id):{projectId:state.projects.filter(p=>!p.archived)[0]?.id||'',name:'',date:iso(new Date()),level:'important',owner:'',description:''};const projectList=state.projects.filter(p=>!p.archived||p.id===m.projectId);const peopleList=state.people.filter(p=>!p.archived);showModal(id?'编辑里程碑':'新增里程碑',`<div class="form"><div class="form-row"><div><label>节点名称</label><input id="f_name" value="${esc(m.name||'')}"></div><div><label>日期</label><input id="f_date" type="date" value="${m.date||iso(new Date())}"></div></div><div class="form-row"><div><label>项目</label><select id="f_project">${projectList.map(p=>`<option value="${p.id}" ${m.projectId===p.id?'selected':''}>${p.name}${p.archived?' (归档)':''}</option>`).join('')}</select></div><div><label>级别</label><select id="f_level"><option value="important" ${m.level==='important'?'selected':''}>重要</option><option value="risk" ${m.level==='risk'?'selected':''}>风险</option></select></div></div><div><label>负责人</label><select id="f_owner"><option value="">未指派</option>${peopleList.map(p=>`<option value="${esc(p.name)}" ${m.owner===p.name?'selected':''}>${esc(p.name)}</option>`).join('')}</select></div><div><label>说明</label><textarea id="f_desc">${esc(m.description||'')}</textarea></div></div>`,async()=>{let d={name:val('f_name'),date:val('f_date'),projectId:val('f_project'),level:val('f_level'),owner:val('f_owner'),description:val('f_desc')};if(!d.name)return toast('请输入节点名称');if(!d.projectId)return toast('请先创建项目');id?await put('/api/milestones/'+id,d):await post('/api/milestones',d);closeModal();await load();toast('已保存节点')},id?async()=>{await deleteMilestone(id,true);closeModal()}:null)}
async function deletePerson(id,skip){if(skip||confirm('删除人员会同步删除该人员排期，确认？')){await del('/api/people/'+id);await load();toast('已删除人员')}}async function deleteProject(id,skip){if(skip||confirm('删除项目会同步删除排期和节点，确认？')){await del('/api/projects/'+id);await load();toast('已删除项目')}}async function deleteAssignment(id,skip){if(skip||confirm('删除该排期？')){await del('/api/assignments/'+id);await load();toast('已删除排期')}}async function deleteMilestone(id,skip){if(skip||confirm('删除该节点？')){await del('/api/milestones/'+id);await load();toast('已删除节点')}}
function selectBar(id){document.querySelectorAll('.assign.bar.selected').forEach(el=>el.classList.remove('selected'));selectedBarId=id;if(id){selectMilestone(null);const el=$('bar_'+id);if(el)el.classList.add('selected')}}
function selectMilestone(id){document.querySelectorAll('.milestone.selected').forEach(el=>el.classList.remove('selected'));selectedMilestoneId=id;if(id){selectBar(null);const el=$('ms_'+id);if(el)el.classList.add('selected')}}

let reordering=null;
function startReorder(e,entity,id){
  e.preventDefault();e.stopPropagation();
  const body=$('resourceBody');
  const el=body.querySelector(`.item[data-id="${id}"]`);
  if(!el)return;
  reordering={entity,id,startY:e.clientY,active:false,el};
  window.addEventListener('pointermove',onReorderMove);
  window.addEventListener('pointerup',finishReorder,{once:true});
}
function onReorderMove(e){
  if(!reordering)return;
  const dy=Math.abs(e.clientY-reordering.startY);
  if(!reordering.active&&dy<5)return;
  if(!reordering.active){reordering.active=true;reordering.el.classList.add('dragging')}
  const body=$('resourceBody');
  const hit=document.elementFromPoint(e.clientX,e.clientY);
  if(!hit)return;
  const targetItem=hit.closest('.item');
  if(!targetItem||targetItem===reordering.el)return;
  const rect=targetItem.getBoundingClientRect();
  const mid=rect.top+rect.height/2;
  if(e.clientY<mid)targetItem.before(reordering.el);
  else targetItem.after(reordering.el);
}
async function finishReorder(e){
  window.removeEventListener('pointermove',onReorderMove);
  const r=reordering;reordering=null;
  if(!r)return;
  r.el.classList.remove('dragging');
  if(!r.active)return;
  const body=$('resourceBody');
  const items=[...body.querySelectorAll('.item')];
  const ids=items.map(el=>el.dataset.id).filter(Boolean);
  if(!ids.length)return;
  try{
    await put('/api/sort',{table:r.entity,ids});
    await load();
    toast('已更新排序');
  }catch(err){toast('排序失败：'+err.message)}
}

document.addEventListener('keydown',async function(e){
  if(e.key!=='Delete')return;
  if(document.activeElement&&['INPUT','SELECT','TEXTAREA'].includes(document.activeElement.tagName))return;
  if(selectedBarId){e.preventDefault();const id=selectedBarId;selectBar(null);await deleteAssignment(id)}
  else if(selectedMilestoneId){e.preventDefault();const id=selectedMilestoneId;selectMilestone(null);await deleteMilestone(id)}
});
document.addEventListener('click',function(e){if(!e.target.closest('.ctx-menu'))$('ctxMenu').style.display='none'});
function showCtxMenu(e,view,rowId,date){
  e.preventDefault();e.stopPropagation();
  const menu=$('ctxMenu');
  let items=[];
  if(view==='person'){
    items.push({label:'＋ 排期到项目',action:()=>openAddAssignment(rowId,null,date)});
    items.push({label:'＋ 里程碑',action:()=>openAddMilestone(null,date)});
  }else{
    items.push({label:'＋ 排期到人员',action:()=>openAddAssignment(null,rowId,date)});
    items.push({label:'＋ 里程碑',action:()=>openAddMilestone(rowId,date)});
  }
  menu.innerHTML=items.map((it,i)=>`<div data-idx="${i}">${it.label}</div>`).join('');
  menu.style.display='block';
  menu.style.left=Math.min(e.clientX,window.innerWidth-160)+'px';
  menu.style.top=Math.min(e.clientY,window.innerHeight-100)+'px';
  menu.onclick=function(ev){
    const idx=ev.target.dataset.idx;
    if(idx!==undefined){items[idx].action();menu.style.display='none'}
  };
}
function openAddAssignment(personId,projectId,date){
  const activePeople=state.people.filter(p=>!p.archived);
  const activeProjects=state.projects.filter(p=>!p.archived);
  const pId=personId||activePeople[0]?.id||'';
  const prId=projectId||activeProjects[0]?.id||'';
  const d=date||iso(new Date());
  const p=person(pId)||{};
  const pr=project(prId)||{};
  showModal('新增排期',`<div class="form"><div class="form-row"><div><label>人员</label><select id="f_person">${activePeople.map(x=>`<option value="${x.id}" ${x.id===pId?'selected':''}>${x.name}</option>`).join('')}</select></div><div><label>项目</label><select id="f_project">${activeProjects.map(x=>`<option value="${x.id}" ${x.id===prId?'selected':''}>${x.name}</option>`).join('')}</select></div></div><div class="form-row"><div><label>开始日期</label><input id="f_date" type="date" value="${d}" onchange="updatePerDayHint()"></div><div><label>结束日期</label><input id="f_end" type="date" value="${d}" onchange="updatePerDayHint()"></div></div><div class="form-row"><div><label>总工时/h</label><input id="f_total" type="number" value="8" min="0" oninput="updatePerDayHint()"><span id="f_perday" class="form-hint">1天 · 每日8.0h</span></div><div><label>备注</label><input id="f_note" value=""></div></div></div>`,async()=>{const sd=val('f_date'),ed=val('f_end'),dd=rangeDays(sd,ed),t=Number(val('f_total')||0);const proj=state.projects.find(x=>x.id===val('f_project'));if(proj&&proj.startDate&&sd<proj.startDate)return toast('排期开始日期不能早于 '+proj.startDate);if(proj&&proj.endDate&&ed>proj.endDate)return toast('排期结束日期不能晚于 '+proj.endDate);await post('/api/assignments',{personId:val('f_person'),projectId:val('f_project'),date:sd,endDate:ed,hours:dd>0?Math.round(t/dd*10)/10:8,note:val('f_note')});closeModal();await load();toast('已新增排期')},null);
}
function openAddMilestone(projectId,date){
  const activeProjects=state.projects.filter(p=>!p.archived);
  const activePeople=state.people.filter(p=>!p.archived);
  const prId=projectId||activeProjects[0]?.id||'';
  const d=date||iso(new Date());
  showModal('新增里程碑',`<div class="form"><div class="form-row"><div><label>节点名称</label><input id="f_name" value=""></div><div><label>日期</label><input id="f_date" type="date" value="${d}"></div></div><div class="form-row"><div><label>项目</label><select id="f_project">${activeProjects.map(p=>`<option value="${p.id}" ${p.id===prId?'selected':''}>${p.name}</option>`).join('')}</select></div><div><label>级别</label><select id="f_level"><option value="important">重要</option><option value="risk">风险</option></select></div></div><div><label>负责人</label><select id="f_owner"><option value="">未指派</option>${activePeople.map(p=>`<option value="${esc(p.name)}">${esc(p.name)}</option>`).join('')}</select></div><div><label>说明</label><textarea id="f_desc"></textarea></div></div>`,async()=>{let dd={name:val('f_name'),date:val('f_date'),projectId:val('f_project'),level:val('f_level'),owner:val('f_owner'),description:val('f_desc')};if(!dd.name)return toast('请输入节点名称');if(!dd.projectId)return toast('请先创建项目');await post('/api/milestones',dd);closeModal();await load();toast('已新增里程碑')},null);
}
async function importCsv(input){let file=input.files&&input.files[0];if(!file)return;try{let text=await file.text();let r=await fetch('/api/import.csv',{method:'POST',headers:{'Content-Type':'text/csv; charset=utf-8'},body:text});let data=await r.json();if(!r.ok)throw new Error(data.error||'导入失败');await load();toast(`导入完成：排期 ${data.createdAssignments} 条，新增人员 ${data.createdPeople} 个，新增项目 ${data.createdProjects} 个，跳过 ${data.skipped} 行`)}catch(e){toast(e.message)}finally{input.value=''}}function toast(msg){let t=$('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2600)}function esc(s){return String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}function escapeHtml(s){return esc(s)}$('modalMask').addEventListener('click',e=>{if(e.target.id==='modalMask')closeModal()});load().catch(e=>toast(e.message));
</script>
