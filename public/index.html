<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>项目人力排期日历 0.0.1</title>
<link rel="stylesheet" href="css/main.css" />
</head>
<body>
<div class="app">
  <div class="toolbar-row">
    <span class="brand-sm">排期日历</span>
    <div class="tabs tabs-sm">
      <div class="tab active" id="tabProjects">项目</div>
      <div class="tab" id="tabPeople">人员</div>
      <div class="tab" id="tabSettings">设置</div>
    </div>
    <div id="stats" class="stats-inline"></div>
    <div style="flex:1"></div>
    <button>资源池</button>
  </div>
  <div class="workspace">
    <div id="calendarCard" class="calendar-card">
      <div class="calendar-head-slim"><span id="rangeTitle" class="range-title"></span><span id="calendarHint" class="hint" style="margin-left:10px"></span></div>
      <div class="calendar-wrap"><div id="scheduler" class="grid"></div></div>
    </div>
    <div id="settingsCard" class="settings-card" style="display:none"></div>
  </div>
</div>
<div id="drawerMask" class="drawer-mask">
  <aside class="drawer">
    <div class="drawer-head"><div class="drawer-title">资源池</div><div style="flex:1"></div><span id="drawerAdd" style="margin-right:8px"></span><button>关闭</button></div>
    <div class="resource-tabs">
      <button id="rPeople" data-resource-tab="people">人员</button>
      <button id="rProjects" data-resource-tab="projects">项目</button>
      <button id="rMilestones" data-resource-tab="milestones">里程碑</button>
    </div>
    <div id="resourceBody" class="resource-body"></div>
  </aside>
</div>
<div id="modalMask" class="modal-mask"><div class="modal"><div class="modal-head"><h2 id="modalTitle"></h2><button onclick="document.getElementById('modalMask').classList.remove('show')">×</button></div><div id="modalBody" class="modal-body"></div><div class="modal-foot"><button id="modalDelete" class="danger">删除</button><div style="flex:1"></div><button id="modalCancel">取消</button><button id="modalSave" class="active">保存</button></div></div></div>
<div id="toast" class="toast"></div>
<div id="ctxMenu" class="ctx-menu" style="display:none"></div>
<div id="dragTip" class="drag-tip"></div>
<input id="csvFile" type="file" accept=".csv,text/csv" style="display:none" />
<script type="module" src="js/app.js"></script>
</body>
</html>
