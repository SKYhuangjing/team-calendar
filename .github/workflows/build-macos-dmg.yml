name: Build macOS DMG

on:
  push:
    tags:
      - '*'
  workflow_dispatch:
    inputs:
      version:
        description: 'DMG version name for manual build testing'
        required: false
        default: 'manual-test'

permissions:
  contents: write

jobs:
  build-dmg:
    name: Build DMG
    runs-on: macos-latest

    env:
      BUILD_VERSION: ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare artifact name
        run: |
          set -euo pipefail
          SAFE_TAG="$(printf '%s' "$BUILD_VERSION" | tr '/ ' '--')"
          echo "SAFE_TAG=$SAFE_TAG" >> "$GITHUB_ENV"

      - name: Build team-calendar.app and DMG
        run: ./macos/build-dmg.sh "$BUILD_VERSION"

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: team-calendar-dmg-${{ env.SAFE_TAG }}
          path: build/macos/team-calendar-${{ env.SAFE_TAG }}.dmg
          if-no-files-found: error

      - name: Attach DMG to GitHub Release
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
          SAFE_TAG: ${{ env.SAFE_TAG }}
        run: |
          set -euo pipefail
          DMG_PATH="build/macos/team-calendar-${SAFE_TAG}.dmg"
          if ! gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release create "$TAG_NAME" --title "$TAG_NAME" --notes "team-calendar macOS DMG"
          fi
          gh release upload "$TAG_NAME" "$DMG_PATH" --clobber
